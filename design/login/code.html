<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OctOP - Sign In to AI Orchestration</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0f172a',
              accent: '#6366f1',
              surface: '#1e293b',
              glow: '#818cf8'
            }
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-animations">
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .bg-mesh {
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(15, 23, 42, 1) 70%);
    }
    .glass-effect {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-brand-dark text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="bg-mesh absolute inset-0"></div>
<!-- Decorative glow in top right -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-brand-accent opacity-10 blur-[120px] rounded-full"></div>
<!-- Decorative glow in bottom left -->
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-600 opacity-10 blur-[120px] rounded-full"></div>
</div>
<!-- END: Background Decorative Elements -->
<!-- BEGIN: Login Container -->
<main class="w-full max-w-md" data-purpose="login-container">
<!-- BEGIN: Header Section -->
<header class="text-center mb-10" data-purpose="login-header">
<!-- Logo Placeholder -->
<div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-brand-accent to-purple-500 rounded-2xl mb-6 shadow-lg shadow-brand-accent/20">
<svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">OctOP</h1>
<p class="text-slate-400">Scale your AI orchestration with intelligence.</p>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Card -->
<section class="glass-effect p-8 rounded-3xl shadow-2xl" data-purpose="login-card">
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-300 mb-2" for="email">Work Email</label>
<input class="w-full px-4 py-3 rounded-xl bg-brand-dark border border-slate-700 text-white focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all duration-200 outline-none" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div data-purpose="form-group">
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-medium text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-brand-accent hover:text-brand-glow transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full px-4 py-3 rounded-xl bg-brand-dark border border-slate-700 text-white focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-700 bg-brand-dark text-brand-accent focus:ring-brand-accent focus:ring-offset-brand-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-400" for="remember-me">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-3 px-4 rounded-xl bg-brand-accent hover:bg-indigo-500 text-white font-bold text-lg shadow-lg shadow-brand-accent/25 transform transition active:scale-[0.98] duration-200" type="submit">
          Sign In
        </button>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-brand-surface text-slate-500 rounded-full glass-effect">Or continue with</span>
</div>
</div>
<!-- END: Divider -->
<!-- BEGIN: Social Logins -->
<div class="grid grid-cols-2 gap-4" data-purpose="social-auth-buttons">
<!-- Google Button -->
<button class="flex items-center justify-center py-2.5 px-4 rounded-xl border border-slate-700 hover:bg-slate-800 transition-colors duration-200">
<img alt="Google Logo" class="w-5 h-5 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2eKGEzBfd8bSm9RyXkwkpENR94QTpx5z8QZIfOhUBXH_7FE3wq3Ii5SWG88-kodC6f-jAX2ldvESYqbVSOSEwQuAcO9tXfqjBHwseEq2qf3QAw-_JTYszceQ_xX5965yLXlED-cB56jMJ0rh3VR43R1fxrXBocGPzbJamleB_StVCWcrMCUfIptP_vIqx7mMMxwNGyEKBB2gPKrmWL_DHcX4RXNA_By7Scq4y6HriVO4TmJvBsLXtRdXCbvhtuHwnHbdt8fpGx8Y"/>
<span class="text-sm font-medium">Google</span>
</button>
<!-- GitHub Button -->
<button class="flex items-center justify-center py-2.5 px-4 rounded-xl border border-slate-700 hover:bg-slate-800 transition-colors duration-200">
<svg class="w-5 h-5 mr-2 text-white" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
<!-- END: Social Logins -->
</section>
<!-- END: Card -->
<!-- BEGIN: Footer Links -->
<footer class="mt-8 text-center text-sm text-slate-500" data-purpose="login-footer">
      Don't have an account? 
      <a class="font-semibold text-brand-accent hover:text-brand-glow transition-colors" href="#">Start your 14-day free trial</a>
</footer>
<!-- END: Footer Links -->
</main>
<!-- END: Login Container -->
</body></html>
