<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OctOP - Sign In with LicenseHub ID</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0f172a',
              accent: '#6366f1',
              surface: '#1e293b',
              glow: '#818cf8'
            }
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-animations">
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .bg-mesh {
      background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(15, 23, 42, 1) 70%);
    }
    .glass-effect {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-brand-dark text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="bg-mesh absolute inset-0"></div>
<!-- Decorative glow in top right -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-brand-accent opacity-10 blur-[120px] rounded-full"></div>
<!-- Decorative glow in bottom left -->
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-600 opacity-10 blur-[120px] rounded-full"></div>
</div>
<!-- END: Background Decorative Elements -->
<!-- BEGIN: Login Container -->
<main class="w-full max-w-md" data-purpose="login-container">
<!-- BEGIN: Header Section -->
<header class="text-center mb-10" data-purpose="login-header">
<!-- Logo Placeholder -->
<div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-brand-accent to-purple-500 rounded-2xl mb-6 shadow-lg shadow-brand-accent/20">
<svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">OctOP</h1>
<p class="text-slate-400">Scale your AI orchestration with intelligence.</p>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Card -->
<section class="glass-effect p-8 rounded-3xl shadow-2xl" data-purpose="login-card">
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" method="POST">
<!-- Login ID Field -->
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-300 mb-2" for="loginId">Login ID</label>
<input class="w-full px-4 py-3 rounded-xl bg-brand-dark border border-slate-700 text-white focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all duration-200 outline-none" id="loginId" name="loginId" placeholder="관리자 ID를 입력하세요" required="" type="text"/>
</div>
<!-- Password Field -->
<div data-purpose="form-group">
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-medium text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-brand-accent hover:text-brand-glow transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full px-4 py-3 rounded-xl bg-brand-dark border border-slate-700 text-white focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-700 bg-brand-dark text-brand-accent focus:ring-brand-accent focus:ring-offset-brand-dark" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-400" for="remember-me">Remember this device</label>
</div>
<!-- Sign In Button -->
<button class="w-full py-3 px-4 rounded-xl bg-brand-accent hover:bg-indigo-500 text-white font-bold text-lg shadow-lg shadow-brand-accent/25 transform transition active:scale-[0.98] duration-200" type="submit">
          Sign In
        </button>
</form>
<!-- END: LoginForm -->
<div class="rounded-2xl border border-slate-800 bg-slate-950/70 px-4 py-4 text-sm leading-6 text-slate-400">
      LicenseHub 계정은 이메일이 아닌 <strong>Login ID</strong> 기반으로 로그인합니다.
    </div>
</section>
<!-- END: Card -->
<!-- BEGIN: Footer Links -->
<footer class="mt-8 text-center text-sm text-slate-500" data-purpose="login-footer">
      Don't have an account? 
      <a class="font-semibold text-brand-accent hover:text-brand-glow transition-colors" href="#">Start your 14-day free trial</a>
</footer>
<!-- END: Footer Links -->
</main>
<!-- END: Login Container -->
</body></html>
