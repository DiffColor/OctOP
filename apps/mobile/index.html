<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b5ea8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OctOP Pocket" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/octop-icon-192.png" type="image/png" />
    <link rel="shortcut icon" href="/octop-icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/octop-apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              telegram: {
                50: "#e9f4ff",
                100: "#d5eaff",
                200: "#abd8ff",
                300: "#7abfff",
                400: "#459fff",
                500: "#2282f6",
                600: "#0b5ea8",
                700: "#0a4f8b",
                800: "#0e395e",
                900: "#0e2a45"
              },
              signal: {
                mint: "#3cc7a1",
                amber: "#ffb55f",
                ink: "#0e1621",
                panel: "#182533"
              }
            },
            fontFamily: {
              sans: ["IBM Plex Sans KR", "Pretendard", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
              display: ["Space Grotesk", "IBM Plex Sans KR", "sans-serif"]
            },
            boxShadow: {
              "telegram-soft": "0 18px 48px rgba(7, 18, 34, 0.28)",
              "telegram-card": "0 10px 30px rgba(7, 18, 34, 0.18)"
            }
          }
        }
      };
    </script>
    <title>OctOP Pocket</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
