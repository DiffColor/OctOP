name: manual-agent-menu-asset

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: "빌드에 사용할 commit id"
        required: true
        type: string
      release_tag:
        description: "대상 릴리스 태그 (예: v1.2.3)"
        required: true
        type: string
      platform:
        description: "릴리스 자산을 다시 게시할 플랫폼"
        required: true
        type: choice
        options:
          - windows
          - macos
          - all

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backfill-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    env:
      SOURCE_COMMIT: ${{ inputs.source_commit }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify and checkout source commit
        shell: pwsh
        run: |
          git rev-parse --verify "$env:SOURCE_COMMIT`^{commit}" | Out-Null
          git checkout --detach "$env:SOURCE_COMMIT"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify release exists
        shell: pwsh
        run: gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY

      - name: Build Windows artifact
        shell: pwsh
        run: node ./scripts/release-agent-menu.mjs --platform windows --version "$env:RELEASE_TAG"

      - name: Resolve Windows asset path
        id: windows-asset
        shell: pwsh
        run: |
          $assetPath = Get-ChildItem -Path "dist/releases/$env:RELEASE_TAG" -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $assetPath) {
            Write-Error "Windows exe asset not found under dist/releases/$env:RELEASE_TAG"
          }
          "path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload Windows asset
        shell: pwsh
        run: gh release upload $env:RELEASE_TAG "${{ steps.windows-asset.outputs.path }}" --clobber --repo $env:GITHUB_REPOSITORY

  backfill-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-14
    env:
      SOURCE_COMMIT: ${{ inputs.source_commit }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
      MAC_CODESIGN_CERT_P12: ${{ secrets.MAC_CODESIGN_CERT_P12 }}
      MAC_CODESIGN_CERT_PASSWORD: ${{ secrets.MAC_CODESIGN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify and checkout source commit
        run: |
          set -euo pipefail
          git rev-parse --verify "${SOURCE_COMMIT}^{commit}" >/dev/null
          git checkout --detach "${SOURCE_COMMIT}"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Verify release exists
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Import macOS signing identity (optional)
        run: |
          if [ -z "${MAC_SIGN_IDENTITY:-}" ]; then
            echo "MAC_SIGN_IDENTITY is not set. Skip codesigning."
            exit 0
          fi

          if [ -z "${MAC_CODESIGN_CERT_P12:-}" ] || [ -z "${MAC_CODESIGN_CERT_PASSWORD:-}" ]; then
            echo "MAC_CODESIGN_CERT_P12 or MAC_CODESIGN_CERT_PASSWORD is missing. Skip codesigning."
            exit 0
          fi

          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-macos-sign.keychain-db"
          CERT_PATH="$RUNNER_TEMP/octop-macos-sign.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$MAC_CODESIGN_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Build macOS artifact
        run: node ./scripts/release-agent-menu.mjs --platform macos --version "$RELEASE_TAG"

      - name: Clean macOS signing keychain
        if: always()
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-macos-sign.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload macOS update assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/releases/"${RELEASE_TAG}"/*.zip)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "macOS zip assets not found under dist/releases/${RELEASE_TAG}" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
