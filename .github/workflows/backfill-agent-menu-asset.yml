name: Backfill Agent Menu Asset

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "대상 릴리스 태그 (예: v1.2.3)"
        required: true
        type: string
      platform:
        description: "누락된 산출물을 추가할 플랫폼"
        required: true
        type: choice
        options:
          - windows
          - macos
          - all

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backfill-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify release exists
        shell: pwsh
        run: gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY

      - name: Resolve Windows asset name
        id: windows-asset
        shell: pwsh
        run: |
          $assetName = "OctOP.WindowsAgentMenu-win-x64-$env:RELEASE_TAG.exe"
          "name=$assetName" >> $env:GITHUB_OUTPUT
          "path=dist/releases/$env:RELEASE_TAG/$assetName" >> $env:GITHUB_OUTPUT

      - name: Build Windows artifact
        shell: pwsh
        run: node ./scripts/release-agent-menu.mjs --platform windows --version "$env:RELEASE_TAG"

      - name: Upload Windows asset
        shell: pwsh
        run: gh release upload $env:RELEASE_TAG "${{ steps.windows-asset.outputs.path }}" --clobber --repo $env:GITHUB_REPOSITORY

  backfill-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Validate macOS signing secrets
        env:
          OCTOP_MACOS_CODESIGN_CERT_P12_BASE64: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 }}
          OCTOP_MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_PASSWORD }}
          OCTOP_MACOS_CODESIGN_IDENTITY: ${{ secrets.OCTOP_MACOS_CODESIGN_IDENTITY }}
          OCTOP_MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_P8_BASE64 }}
          OCTOP_MACOS_NOTARY_KEY_ID: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_ID }}
          OCTOP_MACOS_NOTARY_ISSUER: ${{ secrets.OCTOP_MACOS_NOTARY_ISSUER }}
        run: |
          for name in \
            OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 \
            OCTOP_MACOS_CODESIGN_CERT_PASSWORD \
            OCTOP_MACOS_CODESIGN_IDENTITY \
            OCTOP_MACOS_NOTARY_KEY_P8_BASE64 \
            OCTOP_MACOS_NOTARY_KEY_ID \
            OCTOP_MACOS_NOTARY_ISSUER
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Prepare macOS signing environment
        env:
          OCTOP_MACOS_CODESIGN_CERT_P12_BASE64: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 }}
          OCTOP_MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_PASSWORD }}
          OCTOP_MACOS_CODESIGN_IDENTITY: ${{ secrets.OCTOP_MACOS_CODESIGN_IDENTITY }}
          OCTOP_MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_P8_BASE64 }}
          OCTOP_MACOS_NOTARY_KEY_ID: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_ID }}
          OCTOP_MACOS_NOTARY_ISSUER: ${{ secrets.OCTOP_MACOS_NOTARY_ISSUER }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/octop-release-cert.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/octop-notary-key.p8"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"

          printf '%s' "$OCTOP_MACOS_CODESIGN_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$OCTOP_MACOS_NOTARY_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$OCTOP_MACOS_CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          {
            echo "OCTOP_MACOS_CODESIGN_IDENTITY=$OCTOP_MACOS_CODESIGN_IDENTITY"
            echo "OCTOP_MACOS_NOTARY_KEY_FILE=$NOTARY_KEY_PATH"
            echo "OCTOP_MACOS_NOTARY_KEY_ID=$OCTOP_MACOS_NOTARY_KEY_ID"
            echo "OCTOP_MACOS_NOTARY_ISSUER=$OCTOP_MACOS_NOTARY_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Verify release exists
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Resolve macOS asset names
        id: macos-asset
        run: |
          arch="$(uname -m)"
          update_asset_name="OctOPAgentMenu-macos-${arch}-${RELEASE_TAG}.zip"
          standalone_app_asset_name="OctOP-macos-${arch}-${RELEASE_TAG}.app.zip"
          echo "update_name=${update_asset_name}" >> "$GITHUB_OUTPUT"
          echo "update_path=dist/releases/${RELEASE_TAG}/${update_asset_name}" >> "$GITHUB_OUTPUT"
          echo "standalone_app_name=${standalone_app_asset_name}" >> "$GITHUB_OUTPUT"
          echo "standalone_app_path=dist/releases/${RELEASE_TAG}/${standalone_app_asset_name}" >> "$GITHUB_OUTPUT"

      - name: Build macOS artifact
        run: node ./scripts/release-agent-menu.mjs --platform macos --version "$RELEASE_TAG"

      - name: Upload macOS update asset
        run: gh release upload "$RELEASE_TAG" "${{ steps.macos-asset.outputs.update_path }}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload macOS standalone app asset
        run: gh release upload "$RELEASE_TAG" "${{ steps.macos-asset.outputs.standalone_app_path }}" --clobber --repo "$GITHUB_REPOSITORY"
