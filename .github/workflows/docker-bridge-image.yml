name: Docker Bridge Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag override
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/docker-bridge-image.yml'
      - '.dockerignore'
      - 'docker/bridge/**'
      - 'scripts/**'
      - 'services/codex-adapter/**'
      - 'package.json'
      - 'package-lock.json'

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'octop-bridge' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/bridge/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
