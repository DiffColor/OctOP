name: Release Agent Menu

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build Windows release artifact
        run: node ./scripts/release-agent-menu.mjs --platform windows --version "${{ env.RELEASE_VERSION }}"

      - uses: actions/upload-artifact@v6
        with:
          name: windows-agent-menu-${{ env.RELEASE_TAG }}
          path: dist/releases/${{ env.RELEASE_TAG }}/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_VERSION: ${{ github.ref_name }}
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
      MAC_CODESIGN_CERT_P12: ${{ secrets.MAC_CODESIGN_CERT_P12 }}
      MAC_CODESIGN_CERT_PASSWORD: ${{ secrets.MAC_CODESIGN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Import macOS signing identity (optional)
        run: |
          if [ -z "${MAC_SIGN_IDENTITY:-}" ]; then
            echo "MAC_SIGN_IDENTITY is not set. Skip codesigning."
            exit 0
          fi

          if [ -z "${MAC_CODESIGN_CERT_P12:-}" ] || [ -z "${MAC_CODESIGN_CERT_PASSWORD:-}" ]; then
            echo "MAC_CODESIGN_CERT_P12 or MAC_CODESIGN_CERT_PASSWORD is missing. Skip codesigning."
            exit 0
          fi

          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-macos-sign.keychain-db"
          CERT_PATH="$RUNNER_TEMP/octop-macos-sign.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$MAC_CODESIGN_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Build macOS release artifacts
        run: node ./scripts/release-agent-menu.mjs --platform macos --version "${{ env.RELEASE_VERSION }}"

      - name: Clean macOS signing keychain
        if: always()
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-macos-sign.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" || true

      - uses: actions/upload-artifact@v6
        with:
          name: macos-agent-menu-${{ env.RELEASE_TAG }}
          path: dist/releases/${{ env.RELEASE_TAG }}/*.zip
          if-no-files-found: error

  publish-release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: windows-agent-menu-${{ github.ref_name }}
          path: release-assets/windows

      - uses: actions/download-artifact@v5
        with:
          name: macos-agent-menu-${{ github.ref_name }}
          path: release-assets/macos

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/windows/*
            release-assets/macos/*
          fail_on_unmatched_files: true
