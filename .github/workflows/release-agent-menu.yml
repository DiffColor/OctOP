name: Release Agent Menu

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build Windows release artifact
        run: node ./scripts/release-agent-menu.mjs --platform windows --version "${{ env.RELEASE_VERSION }}"

      - uses: actions/upload-artifact@v6
        with:
          name: windows-agent-menu-${{ env.RELEASE_TAG }}
          path: dist/releases/${{ env.RELEASE_TAG }}/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Validate macOS signing secrets
        env:
          OCTOP_MACOS_CODESIGN_CERT_P12_BASE64: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 }}
          OCTOP_MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_PASSWORD }}
          OCTOP_MACOS_CODESIGN_IDENTITY: ${{ secrets.OCTOP_MACOS_CODESIGN_IDENTITY }}
          OCTOP_MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_P8_BASE64 }}
          OCTOP_MACOS_NOTARY_KEY_ID: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_ID }}
          OCTOP_MACOS_NOTARY_ISSUER: ${{ secrets.OCTOP_MACOS_NOTARY_ISSUER }}
        run: |
          for name in \
            OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 \
            OCTOP_MACOS_CODESIGN_CERT_PASSWORD \
            OCTOP_MACOS_CODESIGN_IDENTITY \
            OCTOP_MACOS_NOTARY_KEY_P8_BASE64 \
            OCTOP_MACOS_NOTARY_KEY_ID \
            OCTOP_MACOS_NOTARY_ISSUER
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Prepare macOS signing environment
        env:
          OCTOP_MACOS_CODESIGN_CERT_P12_BASE64: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_P12_BASE64 }}
          OCTOP_MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.OCTOP_MACOS_CODESIGN_CERT_PASSWORD }}
          OCTOP_MACOS_CODESIGN_IDENTITY: ${{ secrets.OCTOP_MACOS_CODESIGN_IDENTITY }}
          OCTOP_MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_P8_BASE64 }}
          OCTOP_MACOS_NOTARY_KEY_ID: ${{ secrets.OCTOP_MACOS_NOTARY_KEY_ID }}
          OCTOP_MACOS_NOTARY_ISSUER: ${{ secrets.OCTOP_MACOS_NOTARY_ISSUER }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/octop-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/octop-release-cert.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/octop-notary-key.p8"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"

          printf '%s' "$OCTOP_MACOS_CODESIGN_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$OCTOP_MACOS_NOTARY_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$OCTOP_MACOS_CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          {
            echo "OCTOP_MACOS_CODESIGN_IDENTITY=$OCTOP_MACOS_CODESIGN_IDENTITY"
            echo "OCTOP_MACOS_NOTARY_KEY_FILE=$NOTARY_KEY_PATH"
            echo "OCTOP_MACOS_NOTARY_KEY_ID=$OCTOP_MACOS_NOTARY_KEY_ID"
            echo "OCTOP_MACOS_NOTARY_ISSUER=$OCTOP_MACOS_NOTARY_ISSUER"
          } >> "$GITHUB_ENV"

      - name: Build macOS release artifacts
        run: node ./scripts/release-agent-menu.mjs --platform macos --version "${{ env.RELEASE_VERSION }}"

      - uses: actions/upload-artifact@v6
        with:
          name: macos-agent-menu-${{ env.RELEASE_TAG }}
          path: |
            dist/releases/${{ env.RELEASE_TAG }}/*.zip
          if-no-files-found: error

  publish-release:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: windows-agent-menu-${{ github.ref_name }}
          path: release-assets/windows

      - uses: actions/download-artifact@v5
        with:
          name: macos-agent-menu-${{ github.ref_name }}
          path: release-assets/macos

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            release-assets/windows/*
            release-assets/macos/*
          fail_on_unmatched_files: true
